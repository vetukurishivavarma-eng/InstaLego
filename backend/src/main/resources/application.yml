server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/pdf,text/plain,text/css,application/javascript

spring:
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 32MB
  datasource:
    url: jdbc:h2:file:./data/instalego
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

# File uploads directory
app:
  upload-dir: ${UPLOAD_DIR:./uploads}
  groq-api-url: ${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
  groq-model: ${GROQ_MODEL:openai/gpt-oss-120b}
  # Model availability varies by Groq account/tier — llama-4-scout returned 404 "not available" on
  # a real test account, so this defaults to qwen3.6-27b, which was verified (via a direct API
  # probe) to actually accept image input on that account.
  groq-vision-model: ${GROQ_VISION_MODEL:qwen/qwen3.6-27b}
  # Dev-only default — always set a real JWT_SECRET env var in any shared/production environment.
  jwt-secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-1234567890}

---
# PostgreSQL configuration for production
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    # sslmode=require is mandatory for managed Postgres providers like Neon; harmless elsewhere.
    # currentSchema keeps all of InstaLego's tables isolated in their own schema rather than the
    # database's default "public" schema — safe to share a database with other unrelated data.
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require&currentSchema=instalego
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:${DATABASE_USERNAME}}
    password: ${DB_PASSWORD:${DATABASE_PASSWORD}}
  # Runs schema.sql (CREATE SCHEMA IF NOT EXISTS instalego) before Hibernate's ddl-auto=update —
  # Postgres/Neon isn't an "embedded" database so this script doesn't run unless explicitly
  # enabled. Without it, ddl-auto=update tries to create tables in a schema that doesn't exist yet.
  sql:
    init:
      mode: always
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: instalego
  h2:
    console:
      enabled: false

app:
  upload-dir: ${UPLOAD_DIR:/app/uploads}
